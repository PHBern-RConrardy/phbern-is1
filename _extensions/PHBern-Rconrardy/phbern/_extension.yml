title: PHBern Quarto Formats
author: Richard Conrardy / PHBern
version: 0.1.0
quarto-required: ">=1.4.11"
csl: _extensions/PHBern-Rconrardy/phbern/assets/apa.csl
contributes:
  formats:
    common:
      lang: de-CH
      author: Richard Conrardy
    html:
      theme:
        - cosmo
        - styles/phbern-html.scss
      toc: true
      toc-title: Inhalt
      number-sections: false
      bibliography: _extensions/PHBern-Rconrardy/phbern/library.bib
    revealjs:
      theme:
        - default
        - styles/phbern-revealjs.scss
      width: 1600
      height: 900
      filters:
        - revealjs-bibliography-slide.lua
      slide-number: c
      controls: false
      progress: false
      transition: none
      center: false
      hash: true
      menu: false
      toc-title: Inhalt
      title-slide-attributes:
        data-state: title-bg
        data-background-image: "assets/slide_Image.png"
        data-background-size: "100% 100%"
        data-background-position: center
        data-background-repeat: no-repeat
      date-format: "DD.MM.YYYY"
      logo: assets/Log_PHB_black.eps.svg
      bibliography: _extensions/PHBern-Rconrardy/phbern/library.bib
    typst:
      papersize: a4
      fontsize: 10pt
      mainfont: Arial
      toc: false
      number-sections: true
      section-numbering: "1.1"
      template-partials:
        - typst/typst-template.typ
        - typst/typst-show.typ
      format-resources:
        - assets/Log_PHB_black.eps.svg
    docx:
      reference-doc: reference.docx
      toc: false
      number-sections: false
      bibliography: _extensions/PHBern-Rconrardy/phbern/library.bib
    pptx:
      reference-doc: reference.pptx
      slide-level: 2
      toc: false
      bibliography: _extensions/PHBern-Rconrardy/phbern/library.bib
